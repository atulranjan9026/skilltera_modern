<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job API Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        button { padding: 10px 20px; margin: 10px; cursor: pointer; }
        .result { margin: 20px 0; padding: 10px; background: #f5f5f5; border-radius: 5px; }
        .error { background: #ffebee; color: #c62828; }
        .success { background: #e8f5e8; color: #2e7d32; }
        pre { white-space: pre-wrap; word-wrap: break-word; }
    </style>
</head>
<body>
    <h1>Job API Test</h1>
    
    <button onclick="setJWT()">Set JWT Token</button>
    <button onclick="getJobs()">Get Active Jobs</button>
    <button onclick="getSkills()">Get Active Skills</button>
    <button onclick="clearResults()">Clear Results</button>
    
    <div id="results"></div>

    <script>
        // API configuration
        const API_BASE_URL = 'http://localhost:5000/api';
        let authToken = null;

        // Set JWT token
        function setJWT() {
            authToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IjY4OTUwYTZiOGQzODUzMmY0ZjQ2MjBkMCIsImlhdCI6MTc2OTcwMDIyN30.x4j2kvS7zBNEV3HBPYdxYRcZSDXpF1AV-eMd0RJvgY4";
            showResult('JWT token set successfully!', 'success');
        }

        // Make API request
        async function makeRequest(endpoint) {
            if (!authToken) {
                showResult('Please set JWT token first!', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}${endpoint}`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                showResult(`Success - ${endpoint}:\n${JSON.stringify(data, null, 2)}`, 'success');
                return data;
            } catch (error) {
                showResult(`Error - ${endpoint}:\n${error.message}`, 'error');
                throw error;
            }
        }

        // Get active jobs
        // async function getJobs() {
        //     await makeRequest('/candidate/job/activeJobs');
        // }

        // Get active skills
        // async function getSkills() {
        //     await makeRequest('/skillList');
        // }

        

        // Show results
        function showResult(message, type) {
            const resultsDiv = document.getElementById('results');
            const resultDiv = document.createElement('div');
            resultDiv.className = `result ${type}`;
            resultDiv.innerHTML = `<pre>${message}</pre>`;
            resultsDiv.appendChild(resultDiv);
        }

        // Clear results
        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }

        // Auto-set JWT on page load
        window.onload = () => {
            setJWT();
        };
    </script>
</body>
</html>
